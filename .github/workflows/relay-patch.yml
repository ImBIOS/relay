name: Relay Patch

on:
  workflow_dispatch:
    inputs:
      feature:
        description: "Feature slug to apply patch for (e.g., '001-proxy'), or 'all' for all features with patch.md"
        required: false
        default: "all"
      dry-run:
        description: "Dry run (show what would be applied without making changes)"
        type: boolean
        default: false
  schedule:
    # Run daily at 7:00 UTC (after fork-sync if scheduled)
    - cron: "0 7 * * *"

permissions:
  contents: write

jobs:
  apply-patches:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Find features with patches
        id: features
        run: |
          FEATURES=""
          if [ -d .relay/features ]; then
            for dir in .relay/features/*/; do
              if [ -f "${dir}patch.md" ]; then
                NAME=$(basename "$dir")
                FEATURES="$FEATURES $NAME"
              fi
            done
          fi

          echo "features=$FEATURES" >> "$GITHUB_OUTPUT"
          echo "Features with patches:$FEATURES"

      - name: Apply patches
        env:
          TARGET: ${{ github.event.inputs.feature || 'all' }}
          DRY_RUN: ${{ github.event.inputs.dry-run || 'false' }}
        run: |
          echo "=== Relay Patch ==="
          echo "Target: $TARGET"
          echo "Dry run: $DRY_RUN"
          echo ""

          if [ "$TARGET" = "all" ]; then
            FEATURES="${{ steps.features.outputs.features }}"
          else
            FEATURES="$TARGET"
          fi

          if [ -z "$FEATURES" ]; then
            echo "No features with patches to apply."
            exit 0
          fi

          CHANGED=0
          for FEATURE in $FEATURES; do
            PATCH_FILE=".relay/features/${FEATURE}/patch.md"
            if [ ! -f "$PATCH_FILE" ]; then
              echo "WARNING: Patch file not found: $PATCH_FILE"
              continue
            fi

            echo "--- Applying patch: $FEATURE ---"
            echo "File: $PATCH_FILE"

            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY RUN] Would apply patch from $PATCH_FILE"
              continue
            fi

            # Extract intent and reconciliation notes from the patch file
            INTENT=$(awk '/^## Intent$/,/^## [^I]/' "$PATCH_FILE" | head -n -1 | tail -n +2)
            RECONCILIATION=$(awk '/^## Reconciliation Notes$/,/^## [^R]/' "$PATCH_FILE" | head -n -1 | tail -n +2)

            echo "Intent: $(echo "$INTENT" | head -1)"
            echo ""

            # Check if feature references an upstream issue
            if [ -f .relay/registry.json ]; then
              UPSTREAM_ISSUE=$(jq -r --arg id "$(echo $FEATURE | grep -o '^[0-9]*')" \
                '.features[] | select(.id==$id) | .upstreamIssue // empty' \
                .relay/registry.json 2>/dev/null)
              if [ -n "$UPSTREAM_ISSUE" ]; then
                echo "Upstream issue: $UPSTREAM_ISSUE"
              fi
            fi

            CHANGED=$((CHANGED + 1))
            echo ""
          done

          echo "=== Summary ==="
          echo "Patches processed: $CHANGED"

      - name: Commit changes
        if: ${{ github.event.inputs.dry-run != 'true' }}
        run: |
          git config user.name "relay-patch[bot]"
          git config user.email "relay-patch[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: apply relay patches [skip ci]"
          git push
