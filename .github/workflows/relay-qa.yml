name: Relay QA

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".relay/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - ".relay/**"
  workflow_dispatch:
    inputs:
      feature:
        description: "Run QA for a specific feature (e.g., '001-proxy'), or 'all' for all"
        required: false
        default: "all"

permissions:
  contents: read

jobs:
  check-features:
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.features.outputs.list }}
    steps:
      - uses: actions/checkout@v4
      - name: Find features
        id: features
        run: |
          if [ ! -d .relay/features ]; then
            echo "No .relay/features directory found."
            echo "list=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FEATURES=""
          for dir in .relay/features/*/; do
            NAME=$(basename "$dir")
            FEATURES="$FEATURES $NAME"
          done

          echo "list=$FEATURES" >> "$GITHUB_OUTPUT"
          echo "Found features:$FEATURES"

  validate-spec-qa-pairs:
    runs-on: ubuntu-latest
    needs: check-features
    steps:
      - uses: actions/checkout@v4
      - name: Validate every feature folder has spec.md and qa.md
        run: |
          MISSING=0
          for FEATURE in ${{ needs.check-features.outputs.features }}; do
            DIR=".relay/features/${FEATURE}"

            if [ ! -f "${DIR}/spec.md" ]; then
              echo "MISSING: ${DIR}/spec.md (feature folder exists but no spec)"
              MISSING=$((MISSING + 1))
            else
              echo "OK: ${FEATURE}/spec.md exists"
            fi

            if [ ! -f "${DIR}/qa.md" ]; then
              echo "MISSING: ${DIR}/qa.md (spec exists but no QA doc)"
              MISSING=$((MISSING + 1))
            else
              echo "OK: ${FEATURE}/qa.md exists"
            fi
          done

          if [ $MISSING -gt 0 ]; then
            echo "::warning::$MISSING missing doc(s) in feature folders"
          fi

  run-tests:
    runs-on: ubuntu-latest
    needs: check-features
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Run tests
        run: bun test

  lint-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check spec format
        run: |
          if [ ! -d .relay/features ]; then
            exit 0
          fi

          ERRORS=0
          for dir in .relay/features/*/; do
            SPEC="${dir}spec.md"
            [ ! -f "$SPEC" ] && continue

            # Check required sections
            for SECTION in "Overview" "Requirements" "Acceptance Criteria"; do
              if ! grep -q "## $SECTION" "$SPEC"; then
                echo "ERROR: $SPEC missing '## $SECTION' section"
                ERRORS=$((ERRORS + 1))
              fi
            done

            # Check status frontmatter
            if ! head -5 "$SPEC" | grep -q "Status:"; then
              echo "ERROR: $SPEC missing Status frontmatter"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS spec format error(s) found"
            exit 1
          fi

          echo "All specs pass format validation."
